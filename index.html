<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nonioaey Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Prompt',sans-serif;
    color:white;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,182,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(173,216,255,0.25), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.15), transparent 40%),
    linear-gradient(135deg,#0a0a14,#121226,#1a1a2e);
}

/* Layout */
.container{
    display:grid;
    grid-template-rows:auto auto 1fr;
    gap:25px;
    padding:20px;
}

/* Glass */
.glass{
    position:relative;
    overflow:hidden;
    border-radius:40px;

    background:
        linear-gradient(to bottom, rgba(255,255,255,0.5), transparent 60%),
        linear-gradient(135deg, rgba(255,182,255,0.2), rgba(200,220,255,0.2)),
        rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.35);

    box-shadow:
        0 0 30px rgba(0,200,255,0.25),
        inset 0 1px 1px rgba(255,255,255,0.4);
}

/* Glossy light */
.glass::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:200%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
    );

    transition:.7s;
}
.glass:hover::before{ left:100%; }

/* Hover float */
.glass:hover{
    transform:translateY(-5px) scale(1.01);
    transition:.3s;
}

/* Header */
.header{
    padding:25px;
    text-align:center;
}

/* Banner */
.banner{
    padding:30px;
    text-align:center;
}

/* Grid */
.grid{
    display:grid;
    grid-template-columns:1fr 2fr 1fr;
    gap:20px;
}

/* Card */
.card{
    padding:20px;
    display:flex;
    gap:20px;
    align-items:center;
}

/* Column */
.column{
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* Copy box */
.copy-box{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    padding:12px;
    border-radius:20px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.25);
}

/* Button */
.btn{
    padding:6px 14px;
    border-radius:20px;
    border:none;
    cursor:pointer;

    background:linear-gradient(135deg,#ffb6ff,#9adfff);
    box-shadow:0 0 15px rgba(0,200,255,0.7);
}

/* Action buttons */
.action{
    display:flex;
    gap:10px;
    margin-top:10px;
}

/* Toast */
#toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%) translateY(-20px);

    padding:12px 20px;
    border-radius:20px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 0 20px rgba(0,200,255,0.4);

    opacity:0;
    transition:.4s;
}
#toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

/* Responsive */
@media(max-width:900px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div id="toast">✔ คัดลอกแล้ว</div>

<div class="container">

<!-- Header -->
<div class="glass header">
    <h2>✨ Nonioaey Payment</h2>
</div>

<!-- Banner -->
<div class="glass banner">
    <h3>อย่าลืมโน๊ตสลิปกันนะคะ</h3>
    <p style="opacity:.8;">หากลืมโน๊ตสลิป โอนมาใหม่ 0.1 พร้อมโน๊ต</p>
</div>

<div class="grid">

<!-- Left -->
<div class="column">
    <div class="glass card">
        <div>
            <h4>ชื่อบัญชี</h4>
            <p>ศศิกานต์ น้ำเขียว</p>

            <div class="copy-box">
                <span>ศศิกานต์ น้ำเขียว</span>
                <button class="btn" onclick="copy('ศศิกานต์ น้ำเขียว')">คัดลอก</button>
            </div>
        </div>
    </div>
</div>

<!-- Center -->
<div class="column">

<div class="glass card">
<div style="flex:1;">
<h3>💳 กสิกรไทย</h3>

<div class="copy-box">
<span>131-1-45867-8</span>
<button class="btn" onclick="copy('1311458678')">คัดลอก</button>
</div>

</div>
</div>

<div class="glass card">
<div style="flex:1;">
<h3>📱 Wallet</h3>

<div class="copy-box">
<span>0826348896</span>
<button class="btn" onclick="copy('0826348896')">คัดลอก</button>
</div>

<div class="action">
<button class="btn" onclick="openWallet()">เปิดแอป</button>
<button class="btn" onclick="copy('https://tmn.app.link/nEoPnxQ9R1b')">คัดลอกลิงก์</button>
</div>

</div>
</div>

<div class="glass card">
<div style="flex:1;">
<h3>📝 โน๊ตสลิป</h3>

<div class="copy-box">
<span>ซื้อขายกับFb:Nonioaey</span>
<button class="btn" onclick="copy('ซื้อขายกับFb:Nonioaey')">คัดลอก</button>
</div>

</div>
</div>

<div class="glass card">
<p>โอนเเล้วส่งสลิปไว้ในเเชทได้เลยค่ะ 💖</p>
</div>

</div>

<!-- Right -->
<div class="column">

<div class="glass card">
<div style="flex:1;">
<h4>📱 ติดต่อ</h4>

<div class="action">
<button class="btn" onclick="openFB()">Facebook</button>
<button class="btn" onclick="openLine()">Line</button>
</div>

</div>
</div>

</div>

</div>
</div>

<script>
function copy(text){
navigator.clipboard.writeText(text);
showToast("✔ คัดลอกแล้ว");
}

function showToast(text){
const t=document.getElementById("toast");
t.innerText=text;
t.classList.add("show");

setTimeout(()=>t.classList.remove("show"),2000);
}

function openWallet(){
window.open("https://tmn.app.link/nEoPnxQ9R1b","_blank");
}

function openFB(){
window.open("https://www.facebook.com/profile.php?id=61554192600355","_blank");
}

function openLine(){
window.open("https://line.me/ti/p/LfBtdhlrVa","_blank");
}
</script>

</body>
</html>
